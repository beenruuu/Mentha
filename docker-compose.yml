version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mentha-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mentha
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mentha-network

  redis:
    image: redis:7-alpine
    container_name: mentha-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mentha-network

networks:
  mentha-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
